let perguntas=[]
let atual=0
let pontos=0
let tempo=20
let timer

function iniciar(materia){

document.getElementById("menu").style.display="none"
document.getElementById("quiz").style.display="block"

perguntas=banco[materia]
atual=0
pontos=0

mostrar()

}

function mostrar(){

tempo=20

let barra=document.getElementById("tempo")

timer=setInterval(()=>{

tempo--

barra.style.width=(tempo*5)+"%"

if(tempo==0){
clearInterval(timer)
proxima()
}

},1000)

let p=perguntas[atual]

document.getElementById("pergunta").innerText=p.pergunta

let html=""

p.opcoes.forEach((op,i)=>{

html+=`<button class="opcao" onclick="responder(${i})">${op}</button>`

})

document.getElementById("opcoes").innerHTML=html

}

function responder(opcao){

clearInterval(timer)

let p=perguntas[atual]

let botoes=document.querySelectorAll(".opcao")

botoes.forEach((btn,i)=>{

if(i===p.resposta) btn.classList.add("correto")

if(i===opcao && opcao!==p.resposta) btn.classList.add("errado")

btn.disabled=true

})

if(opcao===p.resposta) pontos++

setTimeout(proxima,1200)

}

function proxima(){

atual++

if(atual<perguntas.length){

mostrar()

}else{

let porcentagem=Math.round((pontos/perguntas.length)*100)

document.getElementById("quiz").innerHTML=

`<h2 class="resultado">Pontuação</h2>
<h2>${porcentagem}%</h2>
<button class="voltar" onclick="location.reload()">Voltar ao menu</button>`

}

}
